<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序演算法示範</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #FFD54F 0%, #FFF8E1 45%, #FFE082 100%);
            color: #5D4037;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
            padding: 32px 36px;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 14px;
            font-size: 28px;
        }

        p {
            margin: 0 0 22px;
            font-size: 16px;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 14px;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #FFB74D, #FF8A65);
            color: #fff;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.18);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.22);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .btn.starry {
            background: linear-gradient(135deg, #5a7fd4, #3d5a99);
        }

        .btn.starry:hover {
            background: linear-gradient(135deg, #7c9eff, #5f7fee);
            box-shadow: 0 8px 22px rgba(99, 125, 234, 0.35);
        }

        .footer {
            margin-top: 28px;
            font-size: 13px;
            color: rgba(93, 64, 55, 0.75);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>排序演算法練習</h1>
        <p>點選下方按鈕進入你想學的排序演算法，會顯示規則說明並用動畫可視化排序過程。</p>

        <div class="button-group">
            <a class="btn" href="bubble-sort.html">氣泡排序法</a>
            <a class="btn starry" href="insertion-sort.html">插入排序法</a>
            <a class="btn" href="selection-sort.html">選擇排序法</a>
        </div>

        <div class="footer">
            建議輸入最多 12 個數字以避免動畫過慢。
        </div>
    </div>
</body>
</html>

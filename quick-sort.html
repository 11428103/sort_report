<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速排序法 - 淺灰優化版</title>
    <style>
        /* 背景與整體樣式 - 淺灰色系 */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #F5F5F5 0%, #E0E0E0 50%, #BDBDBD 100%);
            color: #424242; /* 深灰文字 */
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            position: relative;
        }

        /* 移植：背景上升泡泡效果 */
        body::before, body::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.8) 15%, transparent 70%);
            background-repeat: repeat; background-size: 80px 80px;
            animation: moveBubbles 8s infinite linear; pointer-events: none; z-index: 0;
        }
        body::after { animation-delay: 4s; background-size: 120px 120px; }
        @keyframes moveBubbles { 0% { transform: translateY(0); } 100% { transform: translateY(-120%); } }

        /* 容器樣式 */
        .container {
            background-color: rgba(255, 255, 255, 0.95); /* 白色半透明容器 */
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 25px 35px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            z-index: 1;
            max-height: 95vh;
            overflow-y: auto;
            position: relative;
        }

        h1 { font-size: 26px; margin-bottom: 15px; margin-top: 0; color: #212121; }

        /* --- 排序規則與步驟區塊 --- */
        .info {
            text-align: left;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
            background: rgba(238, 238, 238, 0.7);
            padding: 12px;
            border-radius: 8px;
            color: #616161;
        }
        .info strong { display: block; margin-bottom: 4px; color: #212121; }

        /* 控制項 */
        .controls { margin-bottom: 15px; }
        input {
            width: 50px; padding: 8px; border: 1px solid #BDBDBD;
            border-radius: 5px; font-size: 16px; text-align: center;
        }
        button {
            background-color: #757575; color: white; border: none;
            border-radius: 5px; padding: 8px 15px; font-size: 16px;
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background-color: #424242; }
        button:disabled { background-color: #BDBDBD; cursor: not-allowed; }

        .random-numbers { margin-bottom: 15px; font-weight: bold; color: #757575; }

        /* --- 視覺化排版：長條圖在上 --- */
        .bars {
            display: flex; align-items: flex-end; justify-content: center;
            height: 160px; margin: 10px 0; gap: 8px;
        }
        .bar {
            width: 28px; background-color: #9E9E9E; /* 預設灰色長條 */
            border-radius: 5px 5px 0 0; position: relative;
            transition: height 0.3s ease, background-color 0.2s;
        }
        .bar span {
            position: absolute; bottom: -22px; width: 100%;
            font-size: 12px; text-align: center; font-weight: bold;
            color: #424242;
        }

        /* 狀態顏色 */
        .bar.pivot { background-color: #EF5350; }    /* 紅色：基準值 */
        .bar.compare { background-color: #42A5F5; }  /* 藍色：正在掃描 */
        .bar.swap { background-color: #FFCA28; }     /* 黃色：交換中 */
        .bar.sorted { background-color: #66BB6A; }   /* 綠色：已排序 */

        /* --- 核心排版：說明文字在下（加大、置中、深橘紅） --- */
        .step {
            margin: 30px 0 15px 0;
            font-size: 20px;
            font-weight: bold;
            color: #BF360C; /* 你最喜歡的深橘紅色醒目提示 */
            min-height: 30px;
        }

        .result {
            font-size: 16px;
            color: #616161;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 15px;
        }
        .result span { font-weight: bold; color: #BF360C; }

        .back-link { margin-top: 20px; }
        .back-link a { color: #757575; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .back-link a:hover { color: #212121; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>快速排序法 (Quick Sort)</h1>

        <div class="info">
            <strong>排序規則</strong>
            選取一個「基準值 (Pivot)」，將小於它的移至左側，大於的移至右側。遞迴對兩側重複此步驟。
            <br>
            <strong>示意步驟</strong>
            1) 選擇最後一個元素為基準值 (紅色)
            2) 比 Pivot 小放左，比 Pivot 大放右
            3) 將 Pivot 交換至中間正確位置，此位置已排序
            4) 遞迴排序其左右兩側
        </div>

        <div class="controls">
            數字數量 (1-10)：
            <input type="number" id="numCount" min="1" max="10" value="8">
            <button onclick="startVisualSort()" id="btnStart">生成並排序</button>
        </div>

        <div class="random-numbers" id="randomNumbers"></div>

        <div class="bars" id="bars"></div>

        <div id="stepInfo" class="step">點擊按鈕開始</div>

        <div class="result">
            <p>排序前：<span id="beforeSort"></span></p>
            <p>排序後：<span id="afterSort"></span></p>
        </div>

        <div class="back-link">
            <a href="index.html">← 返回首頁</a>
        </div>
    </div>

    <script>
        const ANIMATION_DELAY = 500;
        let currentArray = [];
        let sortedIndices = [];

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        function render(array, highlights = {}) {
            const container = document.getElementById('bars');
            container.innerHTML = '';
            const max = Math.max(...array, 1);
            array.forEach((value, index) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${(value / max) * 120 + 20}px`;

                if (highlights.sorted && highlights.sorted.includes(index)) bar.classList.add('sorted');
                if (highlights.pivot === index) bar.classList.add('pivot');
                if (highlights.compare === index) bar.classList.add('compare');
                if (highlights.swapA === index || highlights.swapB === index) bar.classList.add('swap');

                const span = document.createElement('span');
                span.textContent = value;
                bar.appendChild(span);
                container.appendChild(bar);
            });
        }

        async function startVisualSort() {
            const count = parseInt(document.getElementById('numCount').value);
            const btn = document.getElementById('btnStart');
            btn.disabled = true;
            sortedIndices = [];
            currentArray = Array.from({length: count}, () => Math.floor(Math.random() * 90) + 10);
            document.getElementById('randomNumbers').textContent = '生成的數字：' + currentArray.join(', ');
            document.getElementById('beforeSort').textContent = currentArray.join(', ');
            document.getElementById('afterSort').textContent = '';
            render(currentArray);
            await sleep(500);
            await quickSort(currentArray, 0, currentArray.length - 1);
            render(currentArray, { sorted: Array.from({length: count}, (_, i) => i) });
            document.getElementById('afterSort').textContent = currentArray.join(', ');
            document.getElementById('stepInfo').textContent = "排序完成！";
            btn.disabled = false;
        }

        async function quickSort(arr, low, high) {
            if (low < high) {
                let pi = await partition(arr, low, high);
                if (!sortedIndices.includes(pi)) sortedIndices.push(pi);
                await quickSort(arr, low, pi - 1);
                await quickSort(arr, pi + 1, high);
            } else if (low === high) {
                if (!sortedIndices.includes(low)) sortedIndices.push(low);
                render(arr, { sorted: sortedIndices });
            }
        }

        async function partition(arr, low, high) {
            let pivot = arr[high];
            let i = low - 1;
            document.getElementById('stepInfo').textContent = `選取 ${pivot} 為基準值 (紅色)`;
            render(arr, { pivot: high, sorted: sortedIndices });
            await sleep(ANIMATION_DELAY);

            for (let j = low; j < high; j++) {
                document.getElementById('stepInfo').textContent = `比較 ${arr[j]} 與基準值 ${pivot}`;
                render(arr, { pivot: high, compare: j, sorted: sortedIndices });
                await sleep(ANIMATION_DELAY);

                if (arr[j] < pivot) {
                    i++;
                    document.getElementById('stepInfo').textContent = `${arr[j]} < ${pivot}，交換位置`;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                    render(arr, { pivot: high, swapA: i, swapB: j, sorted: sortedIndices });
                    await sleep(ANIMATION_DELAY);
                }
            }
            document.getElementById('stepInfo').textContent = `掃描結束，將基準值換至正確位置`;
            [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
            render(arr, { swapA: i + 1, swapB: high, sorted: sortedIndices });
            await sleep(ANIMATION_DELAY);
            return i + 1;
        }
    </script>
</body>
</html>

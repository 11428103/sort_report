<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序法</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #EDE7F6; /* 淡紫色背景 */
            color: #4A148C; /* 深紫色文字 */
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            position: relative;
        }

        /* 背景泡泡 */
        body::before, body::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.8) 15%, transparent 70%);
            background-repeat: repeat; background-size: 80px 80px;
            animation: moveBubbles 8s infinite linear; pointer-events: none; z-index: 0;
        }
        body::after { animation-delay: 4s; background-size: 120px 120px; }
        @keyframes moveBubbles { 0% { transform: translateY(0); } 100% { transform: translateY(-120%); } }

        .container {
            background-color: #F3E5F5;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            padding: 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            z-index: 1;
        }

        h1 { font-size: 26px; margin-bottom: 15px; margin-top: 0; }

        /* 輸入與按鈕區域 */
        .controls { margin-bottom: 20px; }
        input {
            width: 50px; padding: 8px; border: 1px solid #D7CCC8;
            border-radius: 5px; font-size: 16px; text-align: center;
        }
        button {
            background-color: #FFB74D; color: white; border: none;
            border-radius: 5px; padding: 8px 15px; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-left: 5px;
        }
        button:hover { background-color: #FF9800; }

        /* --- 核心排版：圖形在最上面 --- */
        .bars {
            display: flex; align-items: flex-end; justify-content: center;
            height: 180px; margin: 20px 0; gap: 8px;
        }
        .bar {
            width: 28px; background-color: #FFB74D;
            border-radius: 5px 5px 0 0; position: relative;
            transition: 0.3s;
        }
        .bar span {
            position: absolute; bottom: -25px; width: 100%;
            font-size: 14px; text-align: center; font-weight: bold;
        }

        /* 顏色狀態 */
        .bar.compare { background-color: #FF7043; } /* 橘紅色 */
        .bar.swap { background-color: #4DB6AC; }    /* 青綠色 */
        .bar.sorted { background-color: #A5D6A7; }  /* 淺綠色 */

        /* --- 核心排版：說明的文字樣式 --- */
        .step {
            margin: 25px 0 15px 0;
            font-size: 20px;       /* 加大字體 */
            font-weight: bold;    /* 加粗 */
            color: #BF360C;       /* 深橘紅色，如左圖 */
            min-height: 30px;
        }

        .result {
            font-size: 18px;
            color: #5D4037;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 15px;
        }
        .result span { font-weight: bold; color: #BF360C; }

        .back-link { margin-top: 25px; }
        .back-link a { color: #FF9800; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>氣泡排序法</h1>

        <div class="controls">
            數字數量 (1-8)：
            <input type="number" id="numCount" min="1" max="8" value="8">
            <button onclick="generateRandomNumbers()">生成並排序</button>
        </div>

        <div class="bars" id="bars"></div>

        <div class="step" id="stepInfo">點擊按鈕開始</div>

        <div class="result">
            <p>排序前：<span id="beforeSort"></span></p>
            <p>排序後：<span id="afterSort"></span></p>
        </div>

        <div class="back-link">
            <a href="index.html">← 返回首頁</a>
        </div>
    </div>

    <script>
        const ANIMATION_DELAY = 400;
        let currentNumbers = [];

        function generateRandomNumbers() {
            const count = parseInt(document.getElementById('numCount').value);
            currentNumbers = Array.from({length: count}, () => Math.floor(Math.random() * 90) + 10);
            
            document.getElementById('beforeSort').textContent = currentNumbers.join(', ');
            document.getElementById('afterSort').textContent = '';
            
            sortNumbers();
        }

        function renderBars(array, highlights = {}, sorted = []) {
            const container = document.getElementById('bars');
            container.innerHTML = '';
            const max = Math.max(...array, 1);

            array.forEach((value, index) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${(value / max) * 140 + 20}px`;

                if (sorted.includes(index)) bar.classList.add('sorted');
                if (index === highlights.i || index === highlights.j) bar.classList.add('compare');
                if (index === highlights.swapA || index === highlights.swapB) bar.classList.add('swap');

                const label = document.createElement('span');
                label.textContent = value;
                bar.appendChild(label);
                container.appendChild(bar);
            });
        }

        function generateBubbleSteps(original) {
            const a = original.slice();
            const steps = [];
            const markSorted = n => Array.from({ length: n }, (_, i) => original.length - 1 - i);

            for (let i = 0; i < a.length - 1; i++) {
                for (let j = 0; j < a.length - i - 1; j++) {
                    steps.push({
                        arr: a.slice(),
                        highlights: { i: j, j: j + 1 },
                        sorted: markSorted(i),
                        text: `比較 ${a[j]} 與 ${a[j+1]}`
                    });

                    if (a[j] > a[j+1]) {
                        [a[j], a[j+1]] = [a[j+1], a[j]];
                        steps.push({
                            arr: a.slice(),
                            highlights: { swapA: j, swapB: j + 1 },
                            sorted: markSorted(i),
                            text: `交換 ${a[j+1]} 與 ${a[j]}`
                        });
                    }
                }
                steps.push({ arr: a.slice(), highlights: {}, sorted: markSorted(i+1), text: `第 ${i+1} 輪完成` });
            }
            steps.push({ arr: a.slice(), highlights: {}, sorted: markSorted(a.length), text: '排序完成！' });
            return steps;
        }

        function animateSteps(steps) {
            let idx = 0;
            const stepInfo = document.getElementById('stepInfo');
            function next() {
                if (idx >= steps.length) return;
                const step = steps[idx++];
                renderBars(step.arr, step.highlights, step.sorted);
                stepInfo.textContent = step.text;
                if (idx < steps.length) setTimeout(next, ANIMATION_DELAY);
            }
            next();
        }

        function sortNumbers() {
            const steps = generateBubbleSteps(currentNumbers);
            animateSteps(steps);
            const sorted = [...currentNumbers].sort((a,b)=>a-b);
            setTimeout(() => {
                document.getElementById('afterSort').textContent = sorted.join(', ');
            }, ANIMATION_DELAY * (steps.length + 1));
        }
    </script>
</body>
</html>
